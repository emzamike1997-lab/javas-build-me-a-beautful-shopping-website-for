<html>
<head>
  <title>Beautiful Shopping Website for Women</title>
  <meta name="description" content="Discover the latest fashion trends and shop with ease on our beautiful shopping website designed specifically for women">
  <meta property="og:title" content="Beautiful Shopping Website for Women">
  <meta property="og:description" content="Discover the latest fashion trends and shop with ease on our beautiful shopping website designed specifically for women">
  <meta property="og:type" content="website">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080c14;
      --bg2: #0d1220;
      --bg3: #111827;
      --accent: #ff69b4;
      --accent2: #ffc0cb;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --border: rgba(255,255,255,0.08);
      --radius: 12px;
      --space: 8px;
      --max-w: 1200px;
    }
    body {
      font-family: Inter, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
    }
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 72px;
      background: rgba(8,12,20,0.85);
      backdrop-filter: blur(20px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
    }
    .nav-logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }
    .nav-links {
      display: flex;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .nav-link {
      margin-right: 24px;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
    }
    .nav-link:hover {
      color: var(--text);
    }
    .nav-cta {
      background: var(--accent);
      color: var(--text);
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }
    .hero-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
    }
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
    }
    .hero-eyebrow {
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .hero-headline {
      font-size: 72px;
      font-family: Playfair Display, serif;
      line-height: 1.05;
      margin-bottom: 16px;
    }
    .hero-subheadline {
      font-size: 20px;
      color: var(--muted);
      max-width: 560px;
      margin: 0 auto;
    }
    .hero-cta {
      background: var(--accent);
      color: var(--text);
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
    }
    .stats {
      background: var(--bg2);
      padding: 120px 0;
      text-align: center;
    }
    .stat {
      display: inline-block;
      margin: 0 24px;
    }
    .stat-number {
      font-size: 48px;
      font-weight: 900;
      color: var(--accent);
    }
    .stat-label {
      font-size: 13px;
      color: var(--muted);
    }
    .features {
      padding: 120px 0;
    }
    .feature-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .feature-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }
    .feature-icon {
      width: 32px;
      height: 32px;
      margin-bottom: 16px;
    }
    .feature-title {
      font-size: 18px;
      font-weight: 600;
    }
    .feature-body {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.7;
    }
    .gallery {
      padding: 120px 0;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .gallery-item {
      width: 100%;
      border-radius: 8px;
      object-fit: cover;
    }
    .testimonial {
      padding: 120px 0;
    }
    .testimonial-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
    }
    .testimonial-quote {
      font-size: 80px;
      font-family: Playfair Display, serif;
      color: var(--accent);
      opacity: 0.3;
    }
    .testimonial-author {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
    }
    .testimonial-role {
      font-size: 15px;
      color: var(--muted);
    }
    .cta {
      padding: 120px 0;
      background: linear-gradient(to bottom, var(--accent), var(--accent2));
      text-align: center;
    }
    .cta-headline {
      font-size: 48px;
      font-family: Playfair Display, serif;
      line-height: 1.05;
      margin-bottom: 16px;
    }
    .cta-subheadline {
      font-size: 20px;
      color: var(--muted);
      max-width: 560px;
      margin: 0 auto;
    }
    .cta-button {
      background: var(--accent);
      color: var(--text);
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
    }
    .footer {
      background: var(--bg2);
      padding: 24px 0;
      text-align: center;
    }
    .footer-logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
    }
    .footer-links {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .footer-link {
      margin-right: 24px;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
    }
    .footer-link:hover {
      color: var(--text);
    }

      }
      .cta-subheadline {

      }
      .footer {

      }
      .footer-logo {
        font-size: 16px;
        font-weight: 700;
        color: var(--accent);
      }
      .footer-links {

      .footer-link {

        text-decoration: none;
      }
    }
  </style>
</head>
